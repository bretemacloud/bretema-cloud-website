<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brétema Cloud</title>
<meta name="description" content="Consultora galega de cloud, IA e ciberseguridade en produción.">

<!-- SEO: indica a los buscadores cuál es la versión por defecto -->
<link rel="canonical" href="https://bretemacloud.com/gl/">
<link rel="alternate" hreflang="gl" href="https://bretemacloud.com/gl/">
<link rel="alternate" hreflang="es" href="https://bretemacloud.com/es/">
<link rel="alternate" hreflang="x-default" href="https://bretemacloud.com/gl/">

<!-- Detección y redirección por idioma del navegador -->
<script>
  (function() {
    var lang = (navigator.language || navigator.userLanguage || 'gl').toLowerCase();
    var target = lang.startsWith('es') ? '/es/' : '/gl/';
    window.location.replace(target);
  })();
</script>

<!-- Fallback para navegadores sin JavaScript -->
<noscript>
  <meta http-equiv="refresh" content="0; url=/gl/">
</noscript>

<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0e1719;
    color: #e8e4dd;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    text-align: center;
  }
  a {
    color: #e8e4dd;
    text-decoration: none;
    border-bottom: 1px solid #b85c38;
    margin: 0 1rem;
    padding-bottom: 2px;
  }
  a:hover { color: #b85c38; }
  p { font-size: 0.9rem; opacity: 0.7; margin-bottom: 2rem; }
</style>
</head>
<body>
  <div>
    <p>Brétema Cloud</p>
    <a href="/gl/">Galego</a>
    <a href="/es/">Castellano</a>
  </div>
</body>
</html>
